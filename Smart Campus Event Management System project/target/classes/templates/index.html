<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Welcome')}"></head>
<body>
    <nav th:replace="~{fragments :: navbar}"></nav>
    
    <div class="container" style="display:flex; align-items:center; justify-content:center; min-height: 70vh;">
        <div class="card animated" style="text-align: center; max-width: 600px;">
            <i class="fa-solid fa-calendar-check" style="font-size: 4rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Experience Campus Life Like Never Before.</h1>
            <p style="color: var(--text-muted); line-height: 1.6; margin-bottom: 2rem;">
                Discover, register, and manage campus events, seminars, and workshops in one unified platform designed for the modern student and administrator.
            </p>
            <div style="display:flex; gap: 1rem; justify-content: center;">
                <a th:href="@{/login}" class="btn btn-primary" style="padding: 0.8rem 2rem; font-size: 1.1rem;">Get Started</a>
                <a th:href="@{/register}" class="btn" style="padding: 0.8rem 2rem; font-size: 1.1rem; border: 1px solid var(--surface-border);">Create Account</a>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
