<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1 class="cart-title">🛒 Your Cart</h1>

<div class="cart-container">

  <!-- 🛍️ CART ITEMS -->
  <div id="cart-items"></div>

  <!-- 💳 BILLING SECTION -->
  <div class="billing">

    <h2>Order Summary</h2>

    <p>Subtotal: <span id="subtotal">₹0</span></p>
    <p>Tax (10%): <span id="tax">₹0</span></p>
    <h3>Total: <span id="total">₹0</span></h3>

    <hr>

    <!-- 📍 ADDRESS -->
    <h3>Delivery Address</h3>
    <textarea id="address" placeholder="Enter your address"></textarea>

    <hr>

    <!-- 💳 PAYMENT -->
    <h3>Payment Method</h3>

    <label>
      <input type="radio" name="payment" value="cod"> Cash on Delivery
    </label>

    <label>
      <input type="radio" name="payment" value="card"> Card Payment
    </label>

    <label>
      <input type="radio" name="payment" value="upi"> UPI
    </label>

    <!-- 💳 CARD DETAILS -->
    <div id="card-details" class="hidden">
      <input type="text" placeholder="Card Number">
      <input type="text" placeholder="Expiry Date">
      <input type="text" placeholder="CVV">
    </div>

    <!-- 📱 UPI -->
    <div id="upi-details" class="hidden">
      <input type="text" placeholder="Enter UPI ID">
    </div>

    <!-- 🛒 BUTTON -->
    <button class="checkout">Place Order</button>

  </div>

</div>

<!-- JS -->
<script src="cart.js" defer></script>
</body>
</html>
