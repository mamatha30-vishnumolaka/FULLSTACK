# Server Config
server.port=9090

# DB Config (H2 in memory)
spring.datasource.url=jdbc:h2:mem:campusdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Razorpay Configuration (Replace with actual keys for production)
razorpay.key.id=rzp_test_dummy_key_12345
razorpay.key.secret=dummy_secret_abc123

# Thymeleaf Config
spring.thymeleaf.cache=false
