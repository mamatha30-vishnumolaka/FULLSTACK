<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Login')}"></head>
<body>
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div class="container" style="display:flex; align-items:center; justify-content:center; min-height: 70vh;">
        <div class="card animated" style="width: 100%; max-width: 400px;">
            <h2 style="text-align:center; margin-bottom: 1.5rem;">Welcome Back</h2>
            
            <div th:if="${param.error}" class="alert alert-danger">
                Invalid username or password.
            </div>
            <div th:if="${param.success}" class="alert alert-success">
                Registration successful! Please login.
            </div>
            
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" required autofocus placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
            </form>
            <p style="text-align:center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
                Don't have an account? <a th:href="@{/register}" style="color: var(--primary);">Register here</a>.
            </p>
            
            <div style="margin-top: 1.5rem; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: var(--radius); font-size: 0.8rem; color: var(--text-muted);">
                <strong>Demo Accounts:</strong><br/>
                Admin: admin / admin123<br/>
                Student: student1 / password
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
